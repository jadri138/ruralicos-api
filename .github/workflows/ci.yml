name: CI

on:
  push:
    branches: [main, 'refactor/**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Usar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Lint (eslint, detecta referencias no definidas)
        run: npm run lint

      - name: Tests locales
        run: npm run test:local

      - name: Invariantes de negocio
        run: npm run check:core
